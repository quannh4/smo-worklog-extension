<div style="padding: 20px;">
    <div style="background: rgba(212, 237, 218, 0.3); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(195, 230, 203, 0.4); color: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 12px; margin: 15px 0; box-shadow: 0 4px 15px 0 rgba(31, 38, 135, 0.2), inset 0 1px 0 0 rgba(255, 255, 255, 0.2); text-align: center;">
        <h4 style="margin-top: 0; margin-bottom: 15px; text-shadow: 0 1px 5px rgba(0, 0, 0, 0.2); font-size: 24px;">✓ Success!</h4>
        <p style="text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); font-size: 18px; margin-bottom: 20px;">{{SUCCESS_MESSAGE}}</p>
        
        <div style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left;">
            <p style="margin: 5px 0; color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15);"><strong>Project:</strong> {{PROJECT_NAME}} ({{PROJECT_CODE}})</p>
            <p style="margin: 5px 0; color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15);"><strong>Date Range:</strong> {{START_DATE}} to {{END_DATE}}</p>
            <p style="margin: 5px 0; color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15);"><strong>Members Rebooked:</strong> {{MEMBER_COUNT}}</p>
        </div>

        <div style="margin-top: 25px;">
            <button id="backToProjectsBtn2" class="success" style="padding: 12px 40px; font-size: 16px; margin-right: 10px;">Back to Projects</button>
            <button id="closeRebookSuccessBtn2" class="info" style="padding: 12px 40px; font-size: 16px;">Close</button>
        </div>
    </div>
</div>
