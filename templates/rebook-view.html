<div>
    <div class="form-group" style="margin-bottom: 20px;">
        <label style="color: rgba(255, 255, 255, 0.95); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); font-weight: 600; display: block; margin-bottom: 6px;">Target Project:</label>
        <select id="rebookProjectSelect">
            {{PROJECT_OPTIONS}}
        </select>
    </div>

    <h2 style="color: rgba(255, 255, 255, 0.95); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); margin-bottom: 20px;">Rebook Members</h2>

    <!-- Date Range Selector -->
    <div style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 20px;">
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); margin-bottom: 5px; font-weight: 600;">Start Date:</label>
                <input type="date" id="rebookStartDate" value="{{START_DATE}}"
                       style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.9); font-size: 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);" />
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); margin-bottom: 5px; font-weight: 600;">End Date:</label>
                <input type="date" id="rebookEndDate" value="{{END_DATE}}"
                       style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.9); font-size: 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);" />
            </div>
        </div>
        <div style="margin-top: 10px; padding: 8px 12px; background: rgba(33, 150, 243, 0.15); border-left: 3px solid rgba(33, 150, 243, 0.6); border-radius: 6px;">
            <p style="color: rgba(255, 255, 255, 0.85); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); font-size: 13px; margin: 0;">
                <strong>Note:</strong> Weekend dates will be automatically adjusted to the nearest weekday.
            </p>
        </div>
    </div>

    <!-- Members List -->
    <div style="max-height: 400px; overflow-y: auto; margin-bottom: 20px;">
        <table style="width: 100%; border-collapse: collapse; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2);">
            <thead>
                <tr style="background: rgba(255, 255, 255, 0.1); border-bottom: 2px solid rgba(255, 255, 255, 0.2);">
                    <th style="padding: 12px; text-align: left; color: rgba(255, 255, 255, 0.95); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); font-weight: 600;">Username</th>
                    <th style="padding: 12px; text-align: left; color: rgba(255, 255, 255, 0.95); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); font-weight: 600;">Name</th>
                    <th style="padding: 12px; text-align: left; color: rgba(255, 255, 255, 0.95); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); font-weight: 600;">Title</th>
                    <th style="padding: 12px; text-align: left; color: rgba(255, 255, 255, 0.95); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15); font-weight: 600;">Hours</th>
                </tr>
            </thead>
            <tbody id="rebookMembersBody">
                {{MEMBER_ROWS}}
            </tbody>
        </table>
    </div>

    <!-- Action Buttons -->
    <div style="text-align: center; margin-top: 20px;">
        <button id="submitRebookBtn" class="success liquid-glass liquid-glass-xl" style="font-size: 16px; padding: 12px 30px; margin-right: 10px;">
            Submit Rebook
        </button>
        <button id="cancelRebookBtn" class="info" style="font-size: 16px; padding: 12px 30px;">
            Cancel
        </button>
    </div>
</div>
